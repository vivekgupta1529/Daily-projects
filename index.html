<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>🚀 Smart Character Counter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- ✨ Stars -->
  <div class="stars"></div>

  <div class="container">
    <h2>🚀 Smart Character Counter</h2>

  <div class="bg-text" id="bgText"></div> <!-- 👈 NEW -->
    <textarea 
  id="textarea"
  placeholder="Start typing... space bhi count hoga 😉"></textarea>


    <!-- 📊 Progress Bar -->
    <div class="progress-box">
      <div class="progress" id="progress"></div>
    </div>

    <p>
      Characters: <span class="counter">0</span>
    </p>
  </div>

  <script src="./js/app.js"></script>
</body>
</html>
